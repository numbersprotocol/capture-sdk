name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Validate release
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Verify version sync
        run: python scripts/sync-versions.py --check

      - name: Verify tag matches package versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TS_VERSION=$(node -p "require('./ts/package.json').version")
          PY_VERSION=$(grep -Po '(?<=^version = ")[^"]+' python/pyproject.toml)

          if [ "$VERSION" != "$TS_VERSION" ]; then
            echo "Tag version ($VERSION) does not match TypeScript version ($TS_VERSION)"
            exit 1
          fi

          if [ "$VERSION" != "$PY_VERSION" ]; then
            echo "Tag version ($VERSION) does not match Python version ($PY_VERSION)"
            exit 1
          fi

          echo "Version $VERSION verified in both SDKs"

  # Run tests before publishing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install TypeScript dependencies
        run: npm ci
        working-directory: ts

      - name: Run TypeScript tests
        run: npm test
        working-directory: ts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"
        working-directory: python

      - name: Run Python tests
        run: pytest -v
        working-directory: python

  # Publish TypeScript to npm
  publish-npm:
    name: Publish to npm
    needs: [validate, test]
    runs-on: ubuntu-latest
    outputs:
      checksum: ${{ steps.checksum.outputs.value }}
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Compute package checksum
        id: checksum
        run: |
          npm pack
          CHECKSUM=$(sha256sum *.tgz | awk '{print $1}')
          echo "value=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "npm package SHA256: $CHECKSUM"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publish Python to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: [validate, test]
    runs-on: ubuntu-latest
    outputs:
      checksum: ${{ steps.checksum.outputs.value }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Compute package checksums
        id: checksum
        run: |
          CHECKSUM=$(sha256sum dist/* | awk '{print $1 " " $2}' | tr '\n' '; ')
          echo "value=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "Python package SHA256: $CHECKSUM"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  # Create GitHub Release
  github-release:
    name: Create GitHub Release
    needs: [validate, publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        # Pinned to commit SHA for supply-chain security (tag: v1)
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          name: v${{ needs.validate.outputs.version }}
          body: |
            ## Capture SDK v${{ needs.validate.outputs.version }}

            ### Installation

            **TypeScript/JavaScript:**
            ```bash
            npm install @numbersprotocol/capture-sdk@${{ needs.validate.outputs.version }}
            ```

            **Python:**
            ```bash
            pip install numbersprotocol-capture-sdk==${{ needs.validate.outputs.version }}
            ```

            ### Artifact Checksums (SHA256)
            - npm: `${{ needs.publish-npm.outputs.checksum }}`
            - Python: `${{ needs.publish-pypi.outputs.checksum }}`

            ### Links
            - [npm package](https://www.npmjs.com/package/@numbersprotocol/capture-sdk)
            - [PyPI package](https://pypi.org/project/numbersprotocol-capture-sdk/)
          generate_release_notes: true

